name: MFDS 회수목록 자동 수집

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install selenium webdriver-manager requests

      - name: cache 디렉터리 생성
        run: mkdir -p cache

      - name: MFDS 회수목록 수집
        run: python scrape_job.py
        env:
          CHROME_BIN: /usr/bin/google-chrome

      - name: 결과 커밋 & 푸시
        run: |
          # 스크래핑된 파일 임시 보관
          cp cache/recalls.json /tmp/recalls_new.json
          # 원격 최신 상태로 동기화
          git fetch origin main
          git reset --hard origin/main
          # 새 데이터 복원
          cp /tmp/recalls_new.json cache/recalls.json
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache/recalls.json
          if git diff --staged --quiet; then
            echo "변경 없음 - 커밋 건너뜀"
          else
            git commit -m "chore: MFDS 회수목록 자동 갱신 $(date '+%Y-%m-%d')"
            git push origin main
          fi
